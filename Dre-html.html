<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something</title>
</head
<body>
    <form>
    <fieldset>
        <legend>Veritas University Orientation Portal</legend>
    <label for="fullname">Full Name:</label>
    <input type = "text" placeholder="enter your full name" name="fullname" required><br><br>

    <label for="Matric.No">Matric NO:</label>
    <input type="text" placeholder="enter your matric no" name="Matric No"><br><br>

    <label for="email">Email:</label>
    <input type="email" placeholder="enter your email" name="email address"><br><br>

    <label for="age">Age:</label>
    <input type = "number" id="number" name="number"><br><br>

    <p>Gender:</p>
    <label for="male">Male:</label>
    <input type="radio" id="male" name="gender" value="Male">

    <label for="female">Female:</label>
    <input type="radio" id="female" name="gender" value="Female"><br><br>

    <label for="Date of Birth">DOB:</label>
    <input type="date" id="date" name="date"><br><br>

    <label for="Faculty">Faculty:</label>
<select id="faculty" name="faculty">
<option value="Natural & Applied Sciences">Natural & Applied Sciences</option>
<option value="Health Sciences">Health Sciences</option>
<option value="College of Medicine">College of Medicine</option>
</select><br><br>

    <p>Documents Submitted:</p>
    <label for="admission">Admission Letter:</label>
    <input type="checkbox" id="admission" name="docs" value="Admission
Letter">

<label for="receipt">Payment Receipt:</label>
<input type="checkbox" id="receipt" name="docs" value="Payment
Receipt">

<label for="NIN">NIN:</label>
<input type="checkbox" id="NIN" name="docs" value="Status"><br><br>

<label for="Passport Upload">Passport Upload:</label>
<input type="file" id="file" name="file"><br><br>

<label for="message">Additional Information:</label>
<textarea id="message" name="message" rows="4" cols="40"></textarea><br><br>

<input type="submit" value="Submit">
<input type="reset" value="Clear"><br><br>

</fieldset>
</form>

</body>
</html>
